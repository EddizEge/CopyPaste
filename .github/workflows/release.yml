name: Build Windows release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Run core tests
        shell: pwsh
        run: dotnet run --project tests/CopyPaste.Core.Tests/CopyPaste.Core.Tests.csproj -c Release
      - name: Build portable package
        shell: pwsh
        run: ./tools/Build-Release.ps1
      - name: Sign application
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          ALLOW_UNSIGNED_RELEASE: ${{ vars.ALLOW_UNSIGNED_RELEASE }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64)) {
            if ($env:ALLOW_UNSIGNED_RELEASE -eq "true" -and
                $env:RELEASE_TAG -in @("v1.6.0", "v1.7.0")) {
              Write-Warning "Explicit version-specific exception: $($env:RELEASE_TAG) application files will remain unsigned."
              exit 0
            }
            throw "A trusted signing configuration is required for this release."
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw "WINDOWS_CERTIFICATE_PASSWORD is required for a production release."
          }
          $certificate = Join-Path $env:RUNNER_TEMP "CopyPaste-signing.pfx"
          try {
            [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
            $publish = Get-Item "artifacts/CopyPaste-*-win-x64" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            ./tools/Sign-Artifacts.ps1 -Paths (Join-Path $publish.FullName "CopyPaste.App.exe") `
              -CertificatePath $certificate -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD
            $zip = "$($publish.FullName).zip"
            Remove-Item -LiteralPath $zip -Force
            Compress-Archive -Path (Join-Path $publish.FullName "*") -DestinationPath $zip -CompressionLevel Optimal
          }
          finally {
            Remove-Item -LiteralPath $certificate -Force -ErrorAction SilentlyContinue
          }
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress
      - name: Build Windows installer
        shell: pwsh
        run: ./tools/Build-Installer.ps1
      - name: Sign installer
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          ALLOW_UNSIGNED_RELEASE: ${{ vars.ALLOW_UNSIGNED_RELEASE }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64)) {
            if ($env:ALLOW_UNSIGNED_RELEASE -eq "true" -and
                $env:RELEASE_TAG -in @("v1.6.0", "v1.7.0")) {
              Write-Warning "Explicit version-specific exception: $($env:RELEASE_TAG) installer will remain unsigned."
              exit 0
            }
            throw "A trusted signing configuration is required for this release."
          }
          $certificate = Join-Path $env:RUNNER_TEMP "CopyPaste-signing.pfx"
          try {
            [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
            $setup = Get-Item "artifacts/CopyPaste-*-Setup.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            ./tools/Sign-Artifacts.ps1 -Paths $setup.FullName -CertificatePath $certificate `
              -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD
          }
          finally {
            Remove-Item -LiteralPath $certificate -Force -ErrorAction SilentlyContinue
          }
      - name: Build signed MSIX with modern Windows 11 context menu
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          ALLOW_UNSIGNED_RELEASE: ${{ vars.ALLOW_UNSIGNED_RELEASE }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64)) {
            if ($env:ALLOW_UNSIGNED_RELEASE -eq "true" -and
                $env:RELEASE_TAG -in @("v1.6.0", "v1.7.0")) {
              Write-Warning "Unsigned MSIX packages are not distributable; skipping MSIX for $($env:RELEASE_TAG)."
              exit 0
            }
            throw "A trusted signing configuration is required for this release."
          }
          $certificate = Join-Path $env:RUNNER_TEMP "CopyPaste-msix.pfx"
          try {
            [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
            ./tools/Build-Msix.ps1 -CertificatePath $certificate -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD
          }
          finally {
            Remove-Item -LiteralPath $certificate -Force -ErrorAction SilentlyContinue
          }
      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zip = Get-Item "artifacts/CopyPaste-*-win-x64.zip" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $setup = Get-Item "artifacts/CopyPaste-*-Setup.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $msix = Get-Item "artifacts/CopyPaste-*-x64.msix" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $files = @($setup, $zip) + @($msix | Where-Object { $_ })
          $checksums = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $checksumPath = Join-Path $PWD "artifacts/SHA256SUMS.txt"
          $checksums | Set-Content -LiteralPath $checksumPath -Encoding utf8
          $releaseAssets = @($files.FullName) + $checksumPath
          $notesPath = Join-Path $PWD ".github/release-notes/${{ github.ref_name }}.md"
          if (Test-Path -LiteralPath $notesPath) {
            gh release create "${{ github.ref_name }}" @releaseAssets --notes-file $notesPath --title "CopyPaste ${{ github.ref_name }}"
          }
          else {
            gh release create "${{ github.ref_name }}" @releaseAssets --generate-notes --title "CopyPaste ${{ github.ref_name }}"
          }
